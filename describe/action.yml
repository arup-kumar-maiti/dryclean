name: dryclean Describe
description: Generate PR description using Claude

inputs:
  claude_code_oauth_token:
    description: Claude Code OAuth token
    required: true

runs:
  using: composite
  steps:
    - name: Load describe prompt
      id: prompt
      shell: bash
      run: |
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "content<<$EOF" >> $GITHUB_OUTPUT
        cat ${{ github.action_path }}/prompt.md >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

    - name: Run Claude PR description
      id: describe
      uses: anthropics/claude-code-action@v1
      with:
        claude_code_oauth_token: ${{ inputs.claude_code_oauth_token }}
        claude_args: >-
          --allowedTools "Bash(gh pr *),Bash(git log *),Bash(git diff *),Bash(git show *)"
        prompt: ${{ steps.prompt.outputs.content }}

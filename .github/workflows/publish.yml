name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    name: Build and Publish
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        shell: bash
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "${{ github.ref_name }}")
          MAIN_COMMITS=$(git rev-list origin/main)
          if ! echo "$MAIN_COMMITS" | grep -q "$TAG_COMMIT"; then
            echo "::error::Tag ${{ github.ref_name }} is not on main branch"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        shell: bash
        run: pip install build

      - name: Remove non-semver tags
        shell: bash
        run: git tag -d v1 2>/dev/null || true

      - name: Build package
        shell: bash
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          gh release create "$VERSION" --title "$VERSION" --notes "$NOTES"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update major version tag
        shell: bash
        run: |
          MAJOR=$(echo "${{ github.ref_name }}" | grep -oP 'v\d+')
          git tag -f "$MAJOR" "${{ github.ref_name }}"
          git push origin "$MAJOR" --force
